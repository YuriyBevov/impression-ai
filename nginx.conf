server {
    server_name impression.yuriybevov.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Proxy Qdrant API
    location /api/qdrant/ {
        proxy_pass http://185.207.0.152:6333/;
        proxy_set_header Host $host;
    }

    # Static files
    location / {
        root /home/openclaw/.openclaw/workspace/glossary-ui/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/impression.yuriybevov.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/impression.yuriybevov.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = impression.yuriybevov.ru) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name impression.yuriybevov.ru;
    return 404; # managed by Certbot
}
